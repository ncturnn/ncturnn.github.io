<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKOUT // N★CTURN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a !important; color: #f0f0f0; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; min-height: 100vh; }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* NAVBAR LOGO */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; font-family: 'Syncopate', sans-serif; background-color: #0a0a0a; position: relative; z-index: 10; }
        .logo a { font-size: 2rem !important; font-weight: 700 !important; letter-spacing: 5px !important; color: #ffffff !important; text-decoration: none !important; transition: all 0.3s ease !important; display: inline-block !important; font-style: italic !important; }
        .logo a:hover { color: #ff007f !important; text-shadow: 0 0 15px rgba(255, 0, 127, 0.8) !important; }
        
        .logo a span { 
            color: #ff007f; 
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8); 
            font-style: normal !important; 
            display: inline-block;
            animation: starBreathe 3s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        @keyframes starBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255, 0, 127, 0.6), 0 0 20px rgba(255, 0, 127, 0.4); }
            50% { transform: scale(1.15); text-shadow: 0 0 18px rgba(255, 0, 127, 1), 0 0 35px rgba(255, 0, 127, 0.8); }
        }

        /* NUORODOS KAIRĖJE APAČIOJE */
        .nav-links { position: fixed; bottom: 2rem; left: 4rem; list-style: none; display: flex; flex-direction: column; gap: 1rem; z-index: 9999; font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        .nav-links a { color: #f0f0f0; text-decoration: none; font-size: 0.85rem; letter-spacing: 2px; transition: all 0.3s ease; display: inline-block; }
        .nav-links a:hover { color: #ff007f; transform: translateX(5px); }

        /* CHECKOUT KONTEINERIS */
        .checkout-container { max-width: 1100px; margin: 0 auto; padding: 2rem 4rem 8rem 4rem; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 4rem; position: relative; z-index: 1; }
        .checkout-title { font-family: 'Syncopate', sans-serif; font-size: 2rem; letter-spacing: 4px; margin-bottom: 2rem; color: #fff; grid-column: span 2; border-bottom: 1px solid #222; padding-bottom: 1rem; }
        
        /* FORMA */
        .order-form h3, .summary-box h3 { font-family: 'Syncopate', sans-serif; font-size: 1rem; letter-spacing: 2px; margin-bottom: 1.5rem; color: #fff; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.5rem; color: #666; }
        .form-group input { width: 100%; background: #0d0d0d; border: 1px solid #222; padding: 1rem; color: #fff; font-family: monospace; font-size: 0.9rem; transition: border 0.3s; }
        .form-group input:focus { outline: none; border-color: #ff007f; }

        /* UŽSAKYMO SUVESTINĖ */
        .summary-box { background: #0b0b0b; border: 1px solid #151515; padding: 2rem; height: fit-content; }
        .summary-item { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid #151515; font-size: 0.9rem; color: #888; }
        .summary-item .item-name { max-width: 70%; }
        .summary-total { display: flex; justify-content: space-between; font-family: 'Syncopate', sans-serif; font-size: 1rem; color: #fff; padding-top: 1.5rem; margin-top: 1rem; border-top: 1px solid #222; }
        
        /* MYGTUKAS */
        .submit-order-btn { background: #ff007f; color: #fff; border: none; width: 100%; padding: 1.2rem; font-family: 'Syncopate', sans-serif; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; text-align: center; margin-top: 2rem; display: block; box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); }
        .submit-order-btn:hover { background: #e00070; box-shadow: 0 0 25px rgba(255, 0, 127, 0.7); }
        .submit-order-btn:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; }

        /* SĖKMĖS PRANEŠIMAS */
        .success-message { text-align: center; padding: 5rem 0; grid-column: span 2; display: none; }
        .success-message h2 { font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #ff007f; margin-bottom: 1rem; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        .success-message p { color: #888; font-size: 1rem; letter-spacing: 1px; }

        /* MOBILUS */
        @media (max-width: 768px) {
            .navbar { padding: 1.5rem 1.5rem; }
            .logo a { font-size: 1.3rem !important; }
            .nav-links { position: static; flex-direction: row; justify-content: center; width: 100%; background: #0a0a0a; padding: 1.5rem 0; border-top: 1px solid #111; gap: 2rem; margin-top: 2rem; }
            .checkout-container { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 1.5rem 4rem 1.5rem; }
            .checkout-title { grid-column: span 1; font-size: 1.4rem; text-align: center; }
            .success-message { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <nav class="navbar">
        <div class="logo"><a href="index.html">N<span>★</span>CTURN</a></div>
    </nav>

    <ul class="nav-links">
        <li><a href="shop.html">Shop</a></li>
        <li><a href="archive.html">Archive</a></li>
        <li><a href="about.html">About</a></li>
    </ul>

    <div class="checkout-container" id="checkoutContainer">
        <h2 class="checkout-title">SHIPPING_DETAILS</h2>
        
        <div class="order-form">
            <h3>INFORMATION</h3>
            <form id="orderForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="address">Shipping Address</label>
                    <input type="text" id="address" required placeholder="Vilniaus g. 10-2">
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" required placeholder="Vilnius">
                </div>
                <div class="form-group">
                    <label for="zip">Zip / Postal Code</label>
                    <input type="text" id="zip" required placeholder="LT-12345">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" required placeholder="+37060000000">
                </div>
                
                <button type="submit" class="submit-order-btn" id="submitBtn">PLACE ORDER</button>
            </form>
        </div>

        <div class="summary-box">
            <h3>YOUR_ORDER</h3>
            <div id="summaryItemsContainer">
                </div>
            <div class="summary-total">
                <span>TOTAL:</span>
                <span id="summaryTotalSum">0.00 €</span>
            </div>
        </div>
    </div>

    <div class="success-message" id="successScreen">
        <h2>ORDER_RECEIVED</h2>
        <p>THANK YOU. YOUR ORDER FILES HAVE BEEN LOGGED INTO THE SYSTEM.</p>
        <p style="margin-top: 1rem;"><a href="shop.html" style="color: #fff; text-decoration: underline;">RETURN TO SHOP</a></p>
    </div>

    <script>
        // Užkraunam krepšelį iš localStorage
        let cart = JSON.parse(localStorage.getItem('nocturn_cart')) || [];
        const summaryItemsContainer = document.getElementById('summaryItemsContainer');
        const summaryTotalSum = document.getElementById('summaryTotalSum');
        const orderForm = document.getElementById('orderForm');
        const submitBtn = document.getElementById('submitBtn');
        const checkoutContainer = document.getElementById('checkoutContainer');
        const successScreen = document.getElementById('successScreen');

        // Jei krepšelis tuščias, neleidžiam užsakyti
        if(cart.length === 0) {
            summaryItemsContainer.innerHTML = '<p style="color:#444; font-style:italic;">Bag is empty.</p>';
            submitBtn.disabled = true;
        } else {
            let total = 0;
            summaryItemsContainer.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                summaryItemsContainer.innerHTML += `
                    <div class="summary-item">
                        <span class="item-name">${item.name}</span>
                        <span>${item.price.toFixed(2)} €</span>
                    </div>
                `;
            });
            summaryTotalSum.innerText = `${total.toFixed(2)} €`;
        }

        // Formos apdorojimas ir siuntimas
        orderForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Sustabdom standartinį perkrovimą
            
            submitBtn.innerText = "PROCESSING...";
            submitBtn.disabled = true;

            // Suformatuojam krepšelio prekes į vieną gražų tekstą laiškui
            let itemsText = cart.map(item => `${item.name} (${item.price.toFixed(2)}€)`).join(', ');
            let finalTotal = summaryTotalSum.innerText;

            // Paruošiam duomenis siuntimui (šituos laukus matysi savo Gmail laiške)
            let orderData = {
                Pirkėjas: document.getElementById('name').value,
                Email: document.getElementById('email').value,
                Adresas: document.getElementById('address').value,
                Miestas: document.getElementById('city').value,
                Pastas_Kodas: document.getElementById('zip').value,
                Telefonas: document.getElementById('phone').value,
                UŽSAKYTOS_PREKĖS: itemsText,
                BENDRA_SUMA: finalTotal
            };

            // SVARBU: Čia įrašyk savo Formspree ID vietoj "TAVO_FORMSPREE_ID"
            fetch('https://formspree.io/f/TAVO_FORMSPREE_ID', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(response => {
                if (response.ok) {
                    // Išvalom krepšelį
                    localStorage.removeItem('nocturn_cart');
                    // Paslepiam formą ir parodom sėkmės pranešimą
                    checkoutContainer.style.display = 'none';
                    successScreen.style.display = 'block';
                } else {
                    alert('Oops! Kaut kas nuėjo ne taip. Bandykite dar kartą.');
                    submitBtn.innerText = "PLACE ORDER";
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                alert('Klaida jungiantis prie serverio.');
                submitBtn.innerText = "PLACE ORDER";
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
