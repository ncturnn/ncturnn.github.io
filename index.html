<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCTURN | Welcome to the Void</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a !important;
            color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.04;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png');
        }
        .navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 2rem 4rem; 
            font-family: 'Syncopate', sans-serif;
            background-color: #0a0a0a;
        }
        .logo {
            font-size: 2rem; 
            font-weight: 700; 
            letter-spacing: 5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }
        .logo a {
            color: #fff;
            text-decoration: none;
        }
        .nav-links { 
            list-style: none; 
            display: flex; 
            gap: 2rem; 
        }
        .nav-links a {
            color: #f0f0f0; 
            text-decoration: none; 
            font-size: 0.9rem;
            letter-spacing: 2px; 
            transition: color 0.3s;
        }
        .nav-links a:hover { 
            color: #ff007f; 
        }
        .hero {
            height: 75vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            text-align: center;
            background-color: #0a0a0a;
        }
        .hero h1 {
            font-family: 'Syncopate', sans-serif; 
            font-size: 5rem;
            letter-spacing: -2px; 
            margin-bottom: 1rem; 
            color: #fff;
        }
        .hero p { 
            font-size: 1.1rem; 
            letter-spacing: 4px; 
            margin-bottom: 3rem; 
            color: #888; 
        }
        .shop-btn {
            background: transparent; 
            color: #fff; 
            border: 2px solid #fff;
            padding: 1rem 3rem; 
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem; 
            cursor: pointer; 
            text-decoration: none;
            transition: all 0.3s;
        }
        .shop-btn:hover {
            background: #fff; 
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <nav class="navbar">
        <div class="logo"><a href="index.html">NOCTURN</a></div>
        <ul class="nav-links">
            <li><a href="#">Archive</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="#">Archive</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>OUT OF ORBIT</h1>
        <p>DROP 001 // ENTER THE NOCTURN</p>
        <a href="shop.html" class="shop-btn">EXPLORE COLLECTION</a>
    </header>
</body>
</html>
