<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTER // N★CTURN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #0a0a0a !important; 
            color: #f0f0f0; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 5rem 2rem 4rem 2rem;
        }

        /* JUDANTIS FONAS */
        body::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(rgba(15, 15, 15, 0.4) 2px, transparent 2px),
                        linear-gradient(90deg, rgba(15, 15, 15, 0.4) 2px, transparent 2px);
            background-size: 60px 60px;
            background-position: center;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 25s linear infinite;
            z-index: 0;
        }

        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* MILŽINIŠKAS LOGO VIRŠUJE PER VIDURĮ */
        .header-logo {
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%;
        }
        .header-logo a { 
            font-family: 'Syncopate', sans-serif;
            font-size: 5.5rem; /* Žymiai didesnis dydis kompiuteryje */
            font-weight: 700; 
            letter-spacing: 15px; 
            color: #ffffff; 
            text-decoration: none; 
            display: inline-block; 
            font-style: italic; 
            line-height: 1;
        }
        
        /* ROŽINĖS ŽVAIGŽDĖS BREATHING (KVĖPAVIMO) EFEKTAS */
        .header-logo a span { 
            color: #ff007f; 
            font-style: normal; 
            display: inline-block;
            animation: starBreathe 3s ease-in-out infinite;
        }

        /* CENTRINIS KONTEINERIS SU MYGTUKU */
        .main-content { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* MINIMALISTINIS VOID MYGTUKAS */
        .void-btn { 
            background: #000000; 
            border: 1px solid #1a1a1a; 
            color: #ffffff; 
            font-family: 'Syncopate', sans-serif; 
            font-size: 1.2rem; 
            font-style: italic; 
            font-weight: 700; 
            letter-spacing: 8px; 
            padding: 1.8rem 4.5rem; 
            cursor: pointer; 
            text-decoration: none; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        .void-btn:hover { 
            border-color: #ffffff;
            background: #050505;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
            transform: scale(1.03);
        }

        /* APATINĖ ZONA */
        .footer-terminal {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            position: relative;
            z-index: 10;
        }
        .terminal-text { font-size: 0.7rem; color: #222; letter-spacing: 1px; text-transform: uppercase; }
        .live-timer { font-size: 0.8rem; color: #222; letter-spacing: 2px; }

        /* ANIMACIJOS */
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        @keyframes starBreathe {
            0%, 100% { 
                transform: scale(1); 
                text-shadow: 0 0 10px rgba(255, 0, 127, 0.6), 0 0 25px rgba(255, 0, 127, 0.4);
            }
            50% { 
                transform: scale(1.12); 
                text-shadow: 0 0 25px rgba(255, 0, 127, 1), 0 0 45px rgba(255, 0, 127, 0.8);
            }
        }

        /* AUTOMATINIS LOGO SUMAŽINIMAS TELEFONAMS (RAGELIAMS) */
        @media (max-width: 768px) {
            body { padding: 4rem 1.5rem 2rem 1.5rem; }
            
            .header-logo a { 
                font-size: 2.6rem; /* Idealiai telpa į bet kurį telefoną, bet išlieka didelis */
                letter-spacing: 6px; 
            }
            
            .void-btn { 
                font-size: 0.95rem; 
                letter-spacing: 5px; 
                padding: 1.5rem 2.5rem; 
                width: 90%; 
                max-width: 290px; 
                text-align: center; 
            }
            
            .footer-terminal { flex-direction: column; gap: 1rem; text-align: center; }
            .terminal-text { display: none; }
            .live-timer { font-size: 0.75rem; color: #333; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <header class="header-logo">
        <a href="shop.html">N<span>★</span>CTURN</a>
    </header>

    <main class="main-content">
        <a href="shop.html" class="void-btn">ENTER_VOID</a>
    </main>

    <footer class="footer-terminal">
        <div class="terminal-text">> SYSTEM_READY // ACCESS_GRANTED</div>
        <div class="live-timer" id="liveTimer">00:00:00:00</div>
    </footer>

    <script>
        function updateTimer() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            
            document.getElementById('liveTimer').innerText = `${hours}:${minutes}:${seconds}:${ms}`;
        }
        setInterval(updateTimer, 10);
        updateTimer();
    </script>
</body>
</html>
