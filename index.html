<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTER // N★CTURN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* JUDANTIS FONAS (MOVING BACKGROUND) */
        body { 
            background-color: #050505 !important; 
            color: #f0f0f0; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            height: 100vh;
            position: relative;
        }

        /* Skaitmeninis judantis tinklelis fone */
        body::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(rgba(18, 18, 18, 0.3) 2px, transparent 2px),
                        linear-gradient(90deg, rgba(18, 18, 18, 0.3) 2px, transparent 2px);
            background-size: 50px 50px;
            background-position: center;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.05; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* CENTRINIS KONTEINERIS */
        .hero-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center; 
            position: relative; 
            z-index: 1;
            padding: 0 2rem; 
        }
        
        .system-status { 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            color: #333; 
            margin-bottom: 3rem; 
            text-transform: uppercase; 
        }
        .system-status span { 
            color: #666; 
            animation: pulse 2s infinite;
        }

        /* NEON BLACK MYGTUKAS */
        .void-btn { 
            background: #000000; 
            border: 1px solid #222; 
            color: #ffffff; 
            font-family: 'Syncopate', sans-serif; 
            font-size: 1.6rem; 
            font-style: italic; 
            font-weight: 700; 
            letter-spacing: 10px; 
            padding: 2rem 4.5rem; 
            cursor: pointer; 
            text-decoration: none; 
            position: relative;
            outline: none;
            /* Tamsus, neoninis švytėjimas */
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05), inset 0 0 10px rgba(255, 255, 255, 0.02);
            transition: all 0.5s cubic-bezier(0.15, 0.85, 0.3, 1);
        }
        
        .void-btn:hover { 
            color: #ffffff;
            border-color: #ffffff;
            background: #050505;
            /* Intensyvesnis tamsaus neono (neon black/white) efektas */
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.1);
            transform: scale(1.02) translateY(-2px);
        }

        /* TERMINALO DETALĖS APAČIOJE */
        .terminal-logs { position: absolute; bottom: 3rem; left: 3rem; font-size: 0.7rem; color: #1a1a1a; text-align: left; line-height: 1.6; letter-spacing: 1px; }
        .live-timer { position: absolute; bottom: 3rem; right: 3rem; font-size: 0.8rem; color: #222; letter-spacing: 3px; }

        /* ANIMACIJOS */
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* RESPONSIVE DIZAINAS TELEFONAMS */
        @media (max-width: 768px) {
            .system-status { font-size: 0.65rem; letter-spacing: 3px; margin-bottom: 2rem; }
            .void-btn { font-size: 1rem; letter-spacing: 5px; padding: 1.5rem 2.5rem; width: 85%; max-width: 300px; }
            .terminal-logs { left: 1.5rem; bottom: 2rem; display: none; } /* Paslepiam ant mobilaus, kad nebūtų netvarkos */
            .live-timer { right: 0; left: 0; text-align: center; bottom: 2rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <main class="hero-container">
        <div class="system-status">STATUS: <span>CONNECTION_RESTRICTED</span></div>
        
        <a href="shop.html" class="void-btn">ENTER_VOID</a>

        <div class="terminal-logs">
            <p>> OVERRIDE SUCCESSFUL.</p>
            <p>> NOCTURN SERVER ONLINE // PORT_8080</p>
        </div>

        <div class="live-timer" id="liveTimer">00:00:00:00</div>
    </main>

    <script>
        // Laikrodis, kuris sukasi fone realiu laiku
        function updateTimer() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            
            document.getElementById('liveTimer').innerText = `${hours}:${minutes}:${seconds}:${ms}`;
        }
        setInterval(updateTimer, 10);
        updateTimer();
    </script>
</body>
</html>
