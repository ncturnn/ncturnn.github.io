<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTER // N★CTURN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a !important; color: #f0f0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; font-family: 'Syncopate', sans-serif; background-color: #0a0a0a; position: relative; z-index: 10; }
        .logo a { font-size: 2rem !important; font-weight: 700 !important; letter-spacing: 5px !important; color: #ffffff !important; text-decoration: none !important; transition: all 0.3s ease !important; display: inline-block !important; font-style: italic !important; }
        .logo a span { color: #ff007f; text-shadow: 0 0 12px rgba(255, 0, 127, 1), 0 0 5px rgba(255, 0, 127, 0.8); font-style: normal !important; display: inline-block; }
        .logo a:hover { color: #ff007f !important; text-shadow: 0 0 15px rgba(255, 0, 127, 0.8) !important; }
        
        .nav-links { list-style: none; display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: #f0f0f0; text-decoration: none; font-size: 0.9rem; letter-spacing: 2px; transition: color 0.3s; }
        .nav-links a:hover { color: #ff007f; }

        /* HERO ELEMENTAI */
        .hero-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: calc(100vh - 120px); text-align: center; position: relative; padding: 0 2rem; }
        
        .system-status { font-size: 0.85rem; letter-spacing: 4px; color: #444; margin-bottom: 2rem; text-transform: uppercase; }
        .system-status span { color: #ff007f; text-shadow: 0 0 8px rgba(255, 0, 127, 0.5); animation: blink 1.5s infinite; }

        .void-btn { background: transparent; border: 2px solid #ff007f; color: #fff; font-family: 'Syncopate', sans-serif; font-size: 1.8rem; font-style: italic; font-weight: 700; letter-spacing: 8px; padding: 2rem 4rem; cursor: pointer; transition: all 0.4s cubic-bezier(0.075, 0.82, 0.165, 1); box-shadow: 0 0 20px rgba(255, 0, 127, 0.2); text-decoration: none; position: relative; }
        .void-btn:hover { background: #ff007f; color: #fff; box-shadow: 0 0 40px rgba(255, 0, 127, 0.8); transform: scale(1.05); }

        /* LIVE TERMINAL LOGS */
        .terminal-logs { position: absolute; bottom: 4rem; left: 4rem; font-size: 0.75rem; color: #222; text-align: left; line-height: 1.6; letter-spacing: 1px; }
        .live-timer { position: absolute; bottom: 4rem; right: 4rem; font-size: 0.85rem; color: #555; letter-spacing: 2px; font-weight: bold; }

        /* ANIMACIJOS */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* MOBILIŲJŲ TELEFONŲ RESPONSIVE KLASĖS */
        @media (max-width: 768px) {
            .navbar { padding: 1.5rem 1.5rem; flex-direction: column; gap: 1.5rem; text-align: center; }
            .logo a { font-size: 1.5rem !important; letter-spacing: 3px !important; }
            .nav-links { gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
            
            .hero-container { height: calc(100vh - 180px); }
            .system-status { font-size: 0.7rem; letter-spacing: 2px; }
            
            .void-btn { font-size: 1.1rem; letter-spacing: 4px; padding: 1.5rem 2.5rem; width: 90%; max-width: 320px; text-align: center; }
            
            .terminal-logs { left: 1.5rem; bottom: 2rem; max-width: 250px; font-size: 0.65rem; }
            .live-timer { right: 1.5rem; bottom: 2rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <nav class="navbar">
        <div class="logo"><a href="index.html">N<span>★</span>CTURN</a></div>
        <ul class="nav-links">
            <li><a href="shop.html">Shop</a></li>
            <li><a href="archive.html">Archive</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <main class="hero-container">
        <div class="system-status">CORE_SERVER_STATUS: <span>SYSTEM_ONLINE</span></div>
        
        <a href="shop.html" class="void-btn">ENTER THE VOID</a>

        <div class="terminal-logs">
            <p>> INITIALIZING OVERRIDE PROTOCOL...</p>
            <p>> PROJECT_ID: NTRN-001 LOCKED.</p>
            <p>> SECURE CONNECTION ESTABLISHED.</p>
        </div>

        <div class="live-timer" id="liveTimer">00:00:00:00</div>
    </main>

    <script>
        // GYVAS TERMINALO LAIKRODIS (Suteikia puslapiui dinamiškumo)
        function updateTimer() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            
            document.getElementById('liveTimer').innerText = `${hours}:${minutes}:${seconds}:${ms}`;
        }
        setInterval(updateTimer, 10);
        updateTimer();
    </script>
</body>
</html>
