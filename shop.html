<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP // N★CTURN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a !important; color: #f0f0f0; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; min-height: 100vh; }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* NAVBAR LOGO IR BAG DEŠINĖJE VIRŠUJE */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; font-family: 'Syncopate', sans-serif; background-color: #0a0a0a; position: relative; z-index: 10; }
        .logo a { font-size: 2rem !important; font-weight: 700 !important; letter-spacing: 5px !important; color: #ffffff !important; text-decoration: none !important; transition: all 0.3s ease !important; display: inline-block !important; font-style: italic !important; }
        .logo a:hover { color: #ff007f !important; text-shadow: 0 0 15px rgba(255, 0, 127, 0.8) !important; }
        
        .logo a span { 
            color: #ff007f; 
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8); 
            font-style: normal !important; 
            display: inline-block;
            animation: starBreathe 3s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        .logo a:hover span { text-shadow: 0 0 20px rgba(255, 0, 127, 1), 0 0 30px rgba(255, 0, 127, 0.8); }

        /* BAG MYGTUKAS DEŠINĖJE VIRŠUJE */
        .cart-trigger { background: #0a0a0a !important; border: 2px solid #ff007f !important; color: #fff !important; padding: 0.8rem 1.5rem; font-family: 'Syncopate', sans-serif; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); transition: all 0.3s ease; }
        .cart-trigger:hover { background: #ff007f !important; color: #fff !important; box-shadow: 0 0 25px rgba(255, 0, 127, 0.8); }
        .cart-count { font-weight: bold; color: #ff007f; }
        .cart-trigger:hover .cart-count { color: #fff; }

        /* NUORODOS KAIRĖJE APAČIOJE */
        .nav-links { position: fixed; bottom: 2rem; left: 4rem; list-style: none; display: flex; flex-direction: column; gap: 1rem; z-index: 9999; font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        .nav-links a { color: #f0f0f0; text-decoration: none; font-size: 0.85rem; letter-spacing: 2px; transition: all 0.3s ease; display: inline-block; }
        .nav-links a:hover { color: #ff007f; transform: translateX(5px); }
        
        /* SIDEBAR KREPŠELIS */
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: #0d0d0d; border-left: 1px solid #222; box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 10000000 !important; padding: 3rem 2rem; display: flex; flex-direction: column; transition: right 0.4s cubic-bezier(0.05, 0.74, 0.2, 0.99); }
        .cart-sidebar.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .cart-header h2 { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: #fff;}
        .close-cart { background: none; border: none; color: #666; font-size: 1.5rem; cursor: pointer; }
        .close-cart:hover { color: #ff007f; }
        .cart-items-container { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #151515; font-size: 0.9rem; }
        .cart-item-info h4 { font-family: 'Syncopate', sans-serif; font-size: 0.8rem; margin-bottom: 0.3rem;}
        .cart-item-price { color: #ff007f; }
        .remove-item-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 0.8rem;}
        .remove-item-btn:hover { color: #ff007f; }
        .cart-footer { border-top: 1px solid #222; padding-top: 2rem; margin-top: 1rem; }
        .cart-total { display: flex; justify-content: space-between; font-family: 'Syncopate', sans-serif; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .checkout-btn { background: #ff007f; color: #fff; border: none; width: 100%; padding: 1.2rem; font-family: 'Syncopate', sans-serif; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: background 0.3s; text-align: center; display: block; }
        .checkout-btn:hover { background: #e00070; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .empty-message { color: #444; text-align: center; margin-top: 3rem; font-style: italic; }
        
        /* PRODUKTAI */
        .products-section { padding: 3rem 4rem 8rem 4rem; max-width: 1200px; margin: 0 auto; background-color: #0a0a0a; position: relative; z-index: 1; }
        .section-title { font-family: 'Syncopate', sans-serif; font-size: 2rem; letter-spacing: 4px; margin-bottom: 3rem; border-bottom: 1px solid #222; padding-bottom: 1rem; color: #fff; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        .product-card { background: #0b0b0b; border: 1px solid #151515; padding: 1rem; position: relative; transition: border 0.3s ease; }
        .product-card:hover { border: 1px solid #333; }
        .image-placeholder { width: 100%; height: 400px; background: #121212; display: flex; justify-content: center; align-items: center; color: #444; font-size: 0.8rem; letter-spacing: 2px; border: 1px dashed #222; margin-bottom: 1.5rem; text-transform: uppercase; }
        .product-info { margin-bottom: 1.5rem; }
        .product-info h3 { font-family: 'Syncopate', sans-serif; font-size: 1rem; letter-spacing: 1px; margin-bottom: 0.5rem; color: #fff; }
        .price { font-weight: bold; letter-spacing: 1px; color: #ff007f; font-size: 1.1rem; }
        .add-to-bag-btn { background: transparent; color: #fff; border: 1px solid #333; width: 100%; padding: 1rem; font-family: 'Syncopate', sans-serif; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; }
        .add-to-bag-btn:hover { background: #fff; color: #000; border-color: #fff; }

        @keyframes starBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255, 0, 127, 0.6), 0 0 20px rgba(255, 0, 127, 0.4); }
            50% { transform: scale(1.15); text-shadow: 0 0 18px rgba(255, 0, 127, 1), 0 0 35px rgba(255, 0, 127, 0.8); }
        }

        /* MOBILUS PRITAIKYMAS */
        @media (max-width: 768px) {
            .navbar { padding: 1.5rem 1.5rem; flex-direction: row; justify-content: space-between; align-items: center; }
            .logo a { font-size: 1.3rem !important; letter-spacing: 2px !important; }
            .cart-trigger { padding: 0.6rem 1rem; font-size: 0.75rem; }
            .nav-links { position: static; flex-direction: row; justify-content: center; width: 100%; background: #0a0a0a; padding: 1.5rem 0; border-top: 1px solid #111; gap: 2rem; margin-top: 2rem; }
            .products-section { padding: 2rem 1.5rem 4rem 1.5rem; }
            .section-title { font-size: 1.2rem; text-align: center; }
            .product-grid { grid-template-columns: 1fr; gap: 2rem; }
            .image-placeholder { height: 320px; }
            .cart-sidebar { width: 100%; right: -100%; padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <nav class="navbar">
        <div class="logo"><a href="index.html">N<span>★</span>CTURN</a></div>
        <button class="cart-trigger" id="cartTrigger">BAG (<span class="cart-count" id="cartCount">0</span>)</button>
    </nav>

    <ul class="nav-links">
        <li><a href="shop.html">Shop</a></li>
        <li><a href="archive.html">Archive</a></li>
        <li><a href="about.html">About</a></li>
    </ul>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>YOUR_BAG</h2>
            <button class="close-cart" id="closeCart">×</button>
        </div>
        <div class="cart-items-container" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>TOTAL:</span>
                <span id="cartTotalSum">0.00 €</span>
            </div>
            <button class="checkout-btn" onclick="processCheckout()">PROCEED TO CHECKOUT</button>
        </div>
    </div>

    <section class="products-section">
        <h2 class="section-title">DROP_001 // PROTOTYPES</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="image-placeholder">IMAGE_UNAVAILABLE</div>
                <div class="product-info">
                    <h3>GRAPHIC TEE</h3>
                    <div class="price">40.00 €</div>
                </div>
                <button class="add-to-bag-btn" onclick="addToCart('GRAPHIC TEE', 40.00)">ADD TO BAG</button>
            </div>
            
            <div class="product-card">
                <div class="image-placeholder">IMAGE_UNAVAILABLE</div>
                <div class="product-info">
                    <h3>THERMAL LONG SLEEVE</h3>
                    <div class="price">50.00 €</div>
                </div>
                <button class="add-to-bag-btn" onclick="addToCart('THERMAL LONG SLEEVE', 50.00)">ADD TO BAG</button>
            </div>

            <div class="product-card">
                <div class="image-placeholder">IMAGE_UNAVAILABLE</div>
                <div class="product-info">
                    <h3>HEAVYWEIGHT HOODIE</h3>
                    <div class="price">75.00 €</div>
                </div>
                <button class="add-to-bag-btn" onclick="addToCart('HEAVYWEIGHT HOODIE', 75.00)">ADD TO BAG</button>
            </div>

            <div class="product-card">
                <div class="image-placeholder">IMAGE_UNAVAILABLE</div>
                <div class="product-info">
                    <h3>LOGO BEANIE</h3>
                    <div class="price">0.17 €</div>
                </div>
                <button class="add-to-bag-btn" onclick="addToCart('LOGO BEANIE', 0.17)">ADD TO BAG</button>
            </div>
        </div>
    </section>

    <script>
        let cart = JSON.parse(localStorage.getItem('nocturn_cart')) || [];
        const cartSidebar = document.getElementById('cartSidebar');
        const cartTrigger = document.getElementById('cartTrigger');
        const closeCart = document.getElementById('closeCart');
        const cartItemsContainer = document.getElementById('cartItemsContainer');
        const cartCount = document.getElementById('cartCount');
        const cartTotalSum = document.getElementById('cartTotalSum');

        cartTrigger.addEventListener('click', () => cartSidebar.classList.add('active'));
        closeCart.addEventListener('click', () => cartSidebar.classList.remove('active'));

        function addToCart(name, price) {
            cart.push({ name: name, price: price });
            updateCart();
            cartSidebar.classList.add('active');
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('nocturn_cart', JSON.stringify(cart));
            cartCount.innerText = cart.length;
            cartItemsContainer.innerHTML = '';
            if(cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="empty-message">BAG IS EMPTY</p>';
                cartTotalSum.innerText = '0.00 €';
                return;
            }
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                cartItemsContainer.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <span class="cart-item-price">${item.price.toFixed(2)} €</span>
                        </div>
                        <button class="remove-item-btn" onclick="removeItem(${index})">[REMOVE]</button>
                    </div>
                `;
            });
            cartTotalSum.innerText = `${total.toFixed(2)} €`;
        }

        function processCheckout() {
            if(cart.length === 0) return;
            window.location.href = 'checkout.html';
        }
        updateCart();
    </script>
</body>
