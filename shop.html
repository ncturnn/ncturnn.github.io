<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP // N★CTURN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #f0f0f0; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 4rem; font-family: 'Syncopate', sans-serif; background-color: #0a0a0a; position: relative; z-index: 10; }
        .logo a { font-family: 'Syncopate', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: #fff; text-decoration: none; font-weight: 700; transition: transform 0.3s ease; display: inline-block; }
        .logo a span { color: #ff007f; transition: color 0.3s ease; }
        .logo a:hover { transform: scale(1.05); }
        .logo a:hover span { color: #fff; text-shadow: 0 0 10px #ff007f; }
        
        .nav-links { list-style: none; display: flex; gap: 2rem; }
        .nav-links a { color: #f0f0f0; text-decoration: none; font-size: 0.9rem; letter-spacing: 2px; transition: color 0.3s; }
        .nav-links a:hover { color: #ff007f; }
        .cart-icon { cursor: pointer; font-size: 1rem; letter-spacing: 1px; transition: color 0.3s; }
        .cart-icon:hover { color: #ff007f; }

        .shop-container { max-width: 1200px; margin: 4rem auto; padding: 0 4rem; }
        .section-title { font-family: 'Syncopate', sans-serif; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 3rem; border-bottom: 1px solid #111; padding-bottom: 1rem; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; }
        .product-card { background: #0d0d0d; border: 1px solid #151515; padding: 1.5rem; transition: border-color 0.3s, transform 0.3s; }
        .product-card:hover { border-color: #ff007f; transform: translateY(-5px); }
        .product-image-placeholder { width: 100%; height: 350px; background: #111; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #444; letter-spacing: 2px; text-transform: uppercase; border: 1px solid #1a1a1a; }
        .product-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
        .product-name { font-family: 'Syncopate', sans-serif; font-size: 0.85rem; letter-spacing: 1px; color: #fff; }
        .product-price { color: #ff007f; font-weight: bold; }
        
        .add-to-bag-btn { width: 100%; background: transparent; border: 1px solid #333; color: #fff; padding: 1rem; font-family: 'Syncopate', sans-serif; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
        .add-to-bag-btn:hover { background: #fff; color: #0a0a0a; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* KREPŠELIO ŠONINIS LANGAI */
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: #0d0d0d; border-left: 1px solid #151515; z-index: 1000; padding: 3rem; transition: right 0.4s cubic-bezier(0.05, 0.74, 0.2, 0.99); display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .cart-header h2 { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; letter-spacing: 2px; }
        .close-cart { cursor: pointer; font-size: 1.2rem; color: #666; transition: color 0.3s; }
        .close-cart:hover { color: #ff007f; }
        
        .cart-items-container { flex: 1; overflow-y: auto; margin-bottom: 2rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid #151515; font-size: 0.9rem; }
        .cart-item-info h4 { font-family: 'Syncopate', sans-serif; font-size: 0.75rem; margin-bottom: 0.3rem; }
        .cart-item-info span { color: #ff007f; }
        .remove-item-btn { background: transparent; border: none; color: #444; cursor: pointer; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s; }
        .remove-item-btn:hover { color: #ff007f; }
        
        .cart-footer { border-top: 1px solid #222; padding-top: 2rem; }
        .cart-total-row { display: flex; justify-content: space-between; font-family: 'Syncopate', sans-serif; font-size: 0.9rem; margin-bottom: 2rem; }
        .cart-total-price { color: #ff007f; text-shadow: 0 0 5px rgba(255, 0, 127, 0.3); }
        .checkout-btn { width: 100%; background: #ff007f; border: none; color: #fff; padding: 1.2rem; font-family: 'Syncopate', sans-serif; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        .checkout-btn:hover { background: #e00070; box-shadow: 0 0 20px rgba(255, 0, 127, 0.5); }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <nav class="navbar">
        <div class="logo"><a href="index.html">N<span>★</span>CTURN</a></div>
        <ul class="nav-links">
            <li><a href="shop.html">Shop</a></li>
            <li><a href="archive.html">Archive</a></li>
            <li><a href="about.html">About</a></li>
            <li><div class="cart-icon" onclick="toggleCart()">BAG (<span id="cartCount">0</span>)</div></li>
        </ul>
    </nav>

    <main class="shop-container">
        <h1 class="section-title">DROP_001 // PROTOYPES</h1>
        <div class="products-grid">
            <div class="product-card">
                <div class="product-image-placeholder">Image_Unavailable</div>
                <div class="product-info">
                    <h3 class="product-name">GRAPHIC TEE</h3>
                    <span class="product-price">40.00 €</span>
                </div>
                <button class="add-to-bag-btn" onclick="addToCart('GRAPHIC TEE', 40.00)">ADD TO BAG</button>
            </div>
            <div class="product-card">
                <div class="product-image-placeholder">Image_Unavailable</div>
                <div class="product-info">
                    <h3 class="product-name">THERMAL LONG SLEEVE</h3>
                    <span class="product-price">50.00 €</span>
                </div>
                <button class="add-to-bag-btn" onclick="addToCart('THERMAL LONG SLEEVE', 50.00)">ADD TO BAG</button>
            </div>
        </div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>YOUR_BAG</h2>
            <div class="close-cart" onclick="toggleCart()">×</div>
        </div>
        <div class="cart-items-container" id="cartItemsContainer">
            </div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span>TOTAL:</span>
                <span class="cart-total-price" id="cartTotalPrice">0.00 €</span>
            </div>
            <button class="checkout-btn" onclick="checkoutCart()">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('nocturn_cart')) || [];

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            renderCart();
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            localStorage.setItem('nocturn_cart', JSON.stringify(cart));
            updateCartCount();
            toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('nocturn_cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }

        function updateCartCount() {
            document.getElementById('cartCount').innerText = cart.length;
        }

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            const totalElement = document.getElementById('cartTotalPrice');
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="color:#444; font-size:0.85rem; text-align:center; margin-top:2rem;">BAG_IS_EMPTY</div>';
                totalElement.innerText = '0.00 €';
                return;
            }

            container.innerHTML = '';
            let total = 0;
            
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <span>${item.price.toFixed(2)} €</span>
                        </div>
                        <button class="remove-item-btn" onclick="removeFromCart(${index})">[Remove]</button>
                    </div>
                `;
            });
            totalElement.innerText = `${total.toFixed(2)} €`;
        }

        function checkoutCart() {
            if (cart.length === 0) {
                alert("Your bag is empty.");
                return;
            }
            window.location.href = 'checkout.html';
        }

        updateCartCount();
    </script>
</body>
</html>
