<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP // N★CTURN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0a0a0a !important; 
            color: #f0f0f0; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; background-color: #0a0a0a; position: relative; z-index: 10; }
        .logo a { font-size: 2rem !important; font-weight: 800 !important; letter-spacing: 5px !important; color: #ffffff !important; text-decoration: none !important; transition: all 0.3s ease !important; display: inline-block !important; font-style: italic !important; }
        .logo a:hover { color: #ff007f !important; text-shadow: 0 0 15px rgba(255, 0, 127, 0.8) !important; }
        .logo a span { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.8); font-style: normal !important; display: inline-block; animation: starBreathe 3s ease-in-out infinite; }

        /* BAG MYGTUKAS */
        .cart-trigger { background: #0a0a0a !important; border: 2px solid #ff007f !important; color: #fff !important; padding: 0.8rem 1.5rem; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); transition: all 0.3s ease; }
        .cart-trigger:hover { background: #ff007f !important; color: #fff !important; box-shadow: 0 0 25px rgba(255, 0, 127, 0.8); }

        /* MAIN MAKETAS */
        .main-layout { display: flex; flex: 1; position: relative; width: 100%; padding: 0 4rem 4rem 4rem; align-items: flex-end; }

        /* TOBULAS, ŠVARUS MENIU KAIRĖJE APAČIOJE */
        .main-navigation { 
            display: flex; 
            flex-direction: column; 
            gap: 1.2rem; 
            z-index: 10; 
            min-width: 320px; 
            text-transform: uppercase; 
        }
        .main-navigation a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 1.1rem; 
            letter-spacing: 3px; 
            transition: color 0.3s ease; 
            display: inline-block; 
        }
        .main-navigation a:hover { 
            color: #ff007f; 
        }

        /* COPYRIGHT PAREMTAS TIESIAI TARP MYGTUKŲ, KAIP SCREENSHOTE */
        .menu-copyright {
            font-size: 0.55rem;
            color: #3a3a3a;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.1rem 0;
            pointer-events: none;
            line-height: 1.2;
        }

        /* CENTRINIS SUBSCRIBE BLOKAS */
        .center-content { 
            position: absolute;
            top: 45%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 650px;
            text-align: center;
            padding: 0 2rem;
        }
        .center-content h1 { font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 1.5rem; color: #fff; text-transform: uppercase; font-weight: 800; }
        .center-content p { font-size: 0.7rem; color: #444; letter-spacing: 1px; line-height: 1.8; max-width: 500px; margin: 0 auto 3.5rem auto; text-transform: uppercase; }

        /* ULTRA CLEAN ĮVEDIMO LINIJA SU STRĖLE */
        .input-container { 
            position: relative; 
            max-width: 450px;
            margin: 0 auto;
            border-bottom: 1px solid #222;
            transition: border-color 0.3s ease;
        }
        .input-container:focus-within { 
            border-color: #ff007f; 
        }
        .input-container input { 
            width: 100%; 
            background: transparent; 
            border: none; 
            padding: 1rem 0; 
            color: #fff; 
            font-family: 'Syncopate', sans-serif; 
            font-size: 0.85rem; 
            outline: none; 
            text-align: left;
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }
        .input-container input::placeholder { color: #252525; }
        
        .input-container button { 
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: transparent; 
            border: none; 
            color: #fff; 
            cursor: pointer; 
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        .input-container button:hover { color: #ff007f; }

        @keyframes starBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255, 0, 127, 0.6); }
            50% { transform: scale(1.15); text-shadow: 0 0 18px rgba(255, 0, 127, 1); }
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            .main-layout { flex-direction: column; align-items: center; padding: 2rem 1.5rem; gap: 4rem; }
            .center-content { position: static; transform: none; margin: 6rem 0; order: 1; }
            .main-navigation { order: 2; width: 100%; align-items: center; text-align: center; margin-bottom: 4rem; gap: 1.5rem; }
            .menu-copyright { padding: 0.5rem 0; }
            .center-content h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <nav class="navbar">
        <div class="logo"><a href="index.html">N<span>★</span>CTURN</a></div>
        <button class="cart-trigger">BAG (0)</button>
    </nav>

    <div class="main-layout">
        <div class="main-navigation">
            <a href="shop.html">Shop</a>
            <a href="subscribe.html">Sign Up</a>
            <div class="menu-copyright">&copy; 2026 N★CTURN. ALL RIGHTS RESERVED.</div>
            <a href="archive.html">Archive</a>
            <a href="about.html">About</a>
        </div>

        <div class="center-content">
            <h1>SIGN UP FOR UPDATES</h1>
            <p>By subscribing, you agree to receive technical updates from N★CTURN. You can opt out of the system at any time cycle.</p>
            
            <form onsubmit="event.preventDefault(); alert('[SYSTEM: RECOGNIZED]');">
                <div class="input-container">
                    <input type="email" placeholder="ENTER YOUR EMAIL" required>
                    <button type="submit">→</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
