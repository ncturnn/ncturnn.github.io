<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGN UP // N★CTURN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0a0a0a; 
            color: #f0f0f0; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700; 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; background-color: #0a0a0a; position: relative; z-index: 10; }
        .logo a { font-size: 2rem; font-weight: 800; letter-spacing: 5px; color: #ffffff; text-decoration: none; transition: all 0.3s ease; display: inline-block; font-style: italic; }
        .logo a:hover { color: #ff007f; text-shadow: 0 0 15px rgba(255, 0, 127, 0.8); }
        .logo a span { 
            color: #ff007f; 
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8); 
            font-style: normal; 
            display: inline-block;
            animation: starBreathe 3s ease-in-out infinite;
        }

        /* BAG MYGTUKAS */
        .cart-trigger { background: #0a0a0a; border: 2px solid #ff007f; color: #fff; padding: 0.8rem 1.5rem; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); transition: all 0.3s ease; }
        .cart-trigger:hover { background: #ff007f; color: #fff; box-shadow: 0 0 25px rgba(255, 0, 127, 0.8); }
        .cart-count { font-weight: 800; color: #ff007f; transition: color 0.3s; }
        .cart-trigger:hover .cart-count { color: #fff; }

        /* NAV LINKS (Desktop) */
        .nav-links { position: fixed; bottom: 2rem; left: 4rem; list-style: none; display: flex; flex-direction: column; gap: 1rem; z-index: 9999; text-transform: uppercase; }
        .nav-links a { color: #f0f0f0; text-decoration: none; font-size: 0.85rem; letter-spacing: 2px; transition: all 0.3s ease; display: inline-block; }
        .nav-links a:hover { color: #ff007f; transform: translateX(5px); }

        /* CENTRINIS SUBSCRIBE BLOKAS */
        .center-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 2rem;
            margin-top: -4rem;
        }
        .center-content { 
            width: 100%;
            max-width: 650px;
            text-align: center;
        }
        .center-content h1 { font-weight: 800; font-size: 2rem; letter-spacing: 5px; margin-bottom: 1.5rem; color: #fff; text-transform: uppercase; }
        .center-content p { font-size: 0.7rem; color: #444; letter-spacing: 1px; line-height: 1.8; max-width: 500px; margin: 0 auto 3.5rem auto; text-transform: uppercase; }

        /* ĮVEDIMO LINIJA */
        .input-container { 
            position: relative; 
            max-width: 450px;
            margin: 0 auto;
            border-bottom: 1px solid #222;
            transition: border-color 0.3s ease;
        }
        .input-container:focus-within { 
            border-color: #ff007f; 
        }
        .input-container input { 
            width: 100%; 
            background: transparent; 
            border: none; 
            padding: 1rem 0; 
            color: #fff; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700;
            font-size: 0.85rem; 
            outline: none; 
            text-align: left;
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border-radius: 0;
            -webkit-appearance: none;
        }
        .input-container input::placeholder { color: #252525; }
        
        .input-container button { 
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: transparent; 
            border: none; 
            color: #fff; 
            cursor: pointer; 
            font-size: 1.1rem;
            transition: color 0.3s;
            padding: 0.5rem;
        }
        .input-container button:hover { color: #ff007f; }

        /* FOOTERIS */
        .shop-footer { background: #0a0a0a; border-top: 1px solid #111; padding: 3rem 4rem; display: flex; justify-content: flex-end; align-items: center; font-size: 0.7rem; color: #444; letter-spacing: 1px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10; font-weight: 700; }
        .footer-left { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; white-space: nowrap; }
        .footer-left span { color: #555; }
        .footer-right { display: flex; gap: 2rem; }
        .footer-right a { color: #444; text-decoration: none; transition: color 0.3s; text-transform: uppercase; }
        .footer-right a:hover { color: #ff007f; }

        @keyframes starBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255, 0, 127, 0.6); }
            50% { transform: scale(1.15); text-shadow: 0 0 18px rgba(255, 0, 127, 1); }
        }

        /* MOBILUS PRITAIKYMAS */
        @media (max-width: 768px) {
            .navbar { padding: 1.5rem; }
            .logo a { font-size: 1.3rem; letter-spacing: 2px; }
            .cart-trigger { padding: 0.6rem 1rem; font-size: 0.75rem; }
            
            /* SUTVARKYTOS NUORODOS: dabar jos wrapping'uojasi ir telpa bet kokiame ragelyje */
            .nav-links { 
                position: static; 
                flex-direction: row; 
                flex-wrap: wrap; 
                justify-content: center; 
                align-items: center;
                width: 100%; 
                background: #0a0a0a; 
                padding: 1.5rem 1rem; 
                border-top: 1px solid #111; 
                gap: 1rem 1.5rem; 
                margin-top: auto; 
            }
            .nav-links a { font-size: 0.7rem; letter-spacing: 1px; }
            
            .center-container { margin-top: 2rem; margin-bottom: 2rem; padding: 0 1.5rem; }
            .center-content h1 { font-size: 1.3rem; letter-spacing: 3px; margin-bottom: 1rem; }
            .center-content p { margin-bottom: 2.5rem; font-size: 0.65rem; }
            .input-container { max-width: 100%; }
            
            .shop-footer { position: static; flex-direction: column; gap: 1.5rem; text-align: center; padding: 2rem 1.5rem; border-top: none; }
            .footer-left { position: static; transform: none; }
            .footer-right { justify-content: center; flex-wrap: wrap; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <nav class="navbar">
        <div class="logo"><a href="index.html">N<span>★</span>CTURN</a></div>
        <button class="cart-trigger">BAG (<span class="cart-count">0</span>)</button>
    </nav>

    <ul class="nav-links">
        <li><a href="shop.html">SHOP</a></li>
        <li><a href="archive.html">ARCHIVE</a></li>
        <li><a href="subscribe.html" style="color: #ff007f;">SIGN UP</a></li>
        <li><a href="size-guide.html">SIZE GUIDE</a></li>
        <li><a href="about.html">ABOUT</a></li>
    </ul>

    <div class="center-container">
        <div class="center-content">
            <h1>SIGN UP FOR UPDATES</h1>
            <p>By subscribing, you agree to receive technical updates from N★CTURN. You can opt out of the system at any time cycle.</p>
            
            <form id="subscribeForm">
                <div class="input-container">
                    <input type="email" placeholder="ENTER YOUR EMAIL" required>
                    <button type="submit">→</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="shop-footer">
        <div class="footer-left">
            <span>&copy; 2026 N★CTURN. ALL RIGHTS RESERVED.</span>
        </div>
        <div class="footer-right">
            <a href="https://www.instagram.com/ncturn_n/" target="_blank">Instagram</a>
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </footer>

    <script>
        document.getElementById('subscribeForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const input = this.querySelector('input');
            if(input.value) {
                alert('SYSTEM UPDATE: SUCCESSFUL REGISTRATION.');
                input.value = '';
            }
        });
    </script>
</body>
</html>
