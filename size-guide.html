<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIZE GUIDE // N★CTURN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0a0a0a; 
            color: #f0f0f0; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700; 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Dissolve_Noise_Texture.png'); }
        
        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; background-color: #0a0a0a; position: relative; z-index: 10; }
        .logo a { font-size: 2rem; font-weight: 800; letter-spacing: 5px; color: #ffffff; text-decoration: none; transition: all 0.3s ease; display: inline-block; font-style: italic; }
        .logo a:hover { color: #ff007f; text-shadow: 0 0 15px rgba(255, 0, 127, 0.8); }
        .logo a span { 
            color: #ff007f; 
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8); 
            font-style: normal; 
            display: inline-block;
            animation: starBreathe 3s ease-in-out infinite;
        }

        .cart-trigger { background: #0a0a0a; border: 2px solid #ff007f; color: #fff; padding: 0.8rem 1.5rem; font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); transition: all 0.3s ease; }
        .cart-trigger:hover { background: #ff007f; color: #fff; box-shadow: 0 0 25px rgba(255, 0, 127, 0.8); }

        /* NAV LINKS (Desktop) */
        .nav-links { position: fixed; bottom: 2rem; left: 4rem; list-style: none; display: flex; flex-direction: column; gap: 1rem; z-index: 9999; text-transform: uppercase; }
        .nav-links a { color: #f0f0f0; text-decoration: none; font-size: 0.85rem; letter-spacing: 2px; transition: all 0.3s ease; display: inline-block; }
        .nav-links a:hover { color: #ff007f; transform: translateX(5px); }

        /* KONTEINERIS */
        .size-container {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 4rem 10rem 4rem;
            position: relative;
            z-index: 1;
        }
        .size-title { font-size: 2rem; font-weight: 800; letter-spacing: 4px; margin-bottom: 2rem; color: #fff; border-bottom: 1px solid #222; padding-bottom: 1rem; }
        
        /* DRABUŽIŲ SELEKTORIUS */
        .product-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }
        .product-card {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            padding: 1.2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .product-card:hover {
            border-color: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.1);
        }
        .product-card.active {
            border-color: #ff007f;
            background: rgba(255, 0, 127, 0.03);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        }
        .product-card svg {
            width: 60px;
            height: 60px;
            margin-bottom: 0.8rem;
            fill: none;
            stroke: #444;
            stroke-width: 1.5;
            transition: stroke 0.3s ease;
        }
        .product-card:hover svg, .product-card.active svg {
            stroke: #ff007f;
        }
        .product-card .prod-title {
            font-size: 0.55rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #888;
        }
        .product-card.active .prod-title {
            color: #fff;
        }

        /* IŠDĖSTYMAS */
        .size-content-grid {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            gap: 4rem;
            align-items: center;
        }

        /* BLUEPRINT VIZUALAS */
        .blueprint-box {
            border: 1px dashed #222;
            background: #0b0b0b;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 380px;
        }
        .blueprint-box svg {
            width: 100%;
            max-width: 260px;
            height: auto;
            fill: none;
            stroke: #333;
            stroke-width: 1.5;
        }
        .blueprint-box svg .measuring-line {
            stroke: #ff007f;
            stroke-dasharray: 4 4;
            stroke-width: 1.5;
        }
        .blueprint-box svg .line-text {
            fill: #ff007f;
            font-family: 'Syncopate', sans-serif;
            font-weight: 800;
            font-size: 7px;
        }

        /* LENTELĖ */
        .table-area {
            display: flex;
            flex-direction: column;
        }
        .unit-switcher {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .unit-btn {
            background: none;
            border: 1px solid #222;
            color: #666;
            padding: 0.6rem 1.2rem;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .unit-btn.active {
            border-color: #ff007f;
            color: #fff;
            background: rgba(255, 0, 127, 0.05);
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px dashed #222;
            padding: 1rem;
            background: #0b0b0b;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #666;
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #222;
            text-transform: uppercase;
            white-space: nowrap;
        }
        td {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #fff;
            font-weight: 400;
            padding: 1.4rem 1rem;
            border-bottom: 1px solid #151515;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { color: #ff007f; }
        .size-cell { font-weight: 800; color: #ff007f; }
        .unit-label { font-size: 0.6rem; color: #444; margin-left: 0.2rem; }

        /* FOOTERIS */
        .shop-footer { background: #0a0a0a; border-top: 1px solid #111; padding: 3rem 4rem; display: flex; justify-content: flex-end; align-items: center; font-size: 0.7rem; color: #444; letter-spacing: 1px; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10; font-weight: 700; }
        .footer-left { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; white-space: nowrap; }
        .footer-left span { color: #555; }
        .footer-right { display: flex; gap: 2rem; }
        .footer-right a { color: #444; text-decoration: none; transition: color 0.3s; text-transform: uppercase; }
        .footer-right a:hover { color: #ff007f; }

        @keyframes starBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255, 0, 127, 0.6); }
            50% { transform: scale(1.15); text-shadow: 0 0 18px rgba(255, 0, 127, 1); }
        }

        /* MOBILUS PRITAIKYMAS */
        @media (max-width: 900px) {
            .size-content-grid { grid-template-columns: 1fr; gap: 2rem; }
            .blueprint-box { min-height: 280px; padding: 1rem; }
        }
        @media (max-width: 768px) {
            .navbar { padding: 1.5rem; }
            .logo a { font-size: 1.3rem; }
            
            /* SUTVARKYTA NAVIGACIJA: nuorodos wrapping'uojasi ir telpa ekrane */
            .nav-links { 
                position: static; 
                flex-direction: row; 
                flex-wrap: wrap; 
                justify-content: center; 
                align-items: center;
                width: 100%; 
                background: #0a0a0a; 
                padding: 1.5rem 1rem; 
                border-top: 1px solid #111; 
                gap: 1rem 1.5rem; 
                margin-top: auto; 
            }
            .nav-links a { font-size: 0.7rem; letter-spacing: 1px; }

            .size-container { padding: 2rem 1.5rem 4rem 1.5rem; }
            .size-title { font-size: 1.4rem; text-align: center; }
            .product-selector { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 2rem; }
            .product-card { padding: 0.8rem 0.4rem; }
            .product-card svg { width: 35px; height: 35px; margin-bottom: 0.4rem; }
            .product-card .prod-title { font-size: 0.45rem; }
            .unit-switcher { justify-content: center; }
            th, td { padding: 1rem 0.5rem; font-size: 0.65rem; }
            
            .shop-footer { position: static; flex-direction: column; gap: 1.5rem; text-align: center; padding: 2rem 1.5rem; border-top: none; }
            .footer-left { position: static; transform: none; }
            .footer-right { justify-content: center; flex-wrap: wrap; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <nav class="navbar">
        <div class="logo"><a href="index.html">N<span>★</span>CTURN</a></div>
        <button class="cart-trigger">BAG (0)</button>
    </nav>

    <ul class="nav-links">
        <li><a href="shop.html">SHOP</a></li>

    <div class="size-container">

        <div class="product-selector">
            <div class="product-card active" onclick="selectProduct('jersey', this)">

                <svg viewBox="0 0 100 100"><path d="M30 15 L70 15 L75 85 L52 85 L50 45 L48 85 L25 85 Z M30 30 L70 30"/></svg>
                <div class="prod-title">Pants</div>

        </div>
        
        <div class="size-content-grid">
            <div class="blueprint-box" id="blueprintContainer"></div>
            
            <div class="table-area">
                <div class="unit-switcher">
                    <button class="unit-btn active" id="metricBtn" onclick="setUnit('metric')">METRIC (CM)</button>
                    <button class="unit-btn" id="imperialBtn" onclick="setUnit('imperial')">IMPERIAL (IN)</button>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Size</th>
                                <th id="param1">Chest [A] <span class="unit-label" id="unit1">(CM)</span></th>
                                <th id="param2">Length [B] <span class="unit-label" id="unit2">(CM)</span></th>
                                <th id="param3">Sleeve [C] <span class="unit-label" id="unit3">(CM)</span></th>
                            </tr>
                        </thead>
                        <tbody id="sizeTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="shop-footer">
        <div class="footer-left">
            <span>&copy; 2026 N★CTURN. ALL RIGHTS RESERVED.</span>
        </div>
        <div class="footer-right">
            <a href="https://www.instagram.com/ncturn_n/" target="_blank">Instagram</a>
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </footer>

    <script>
        const sizeData = {
            jersey: {
                headers: ["Chest [A]", "Length [B]", "Sleeve [C]"],
                sizes: [
                    { name: "S", vals: [58, 69, 42] },
                    { name: "M", vals: [60, 71, 42.5] },
                    { name: "L", vals: [62, 73, 43] },
                    { name: "XL", vals: [64, 75, 43.5] }
                ],
                svg: `<svg viewBox="0 0 100 100">
                    <path d="M20 30 L35 15 L50 24 L65 15 L80 30 L75 48 L75 85 L25 85 L25 48 Z" />
                    <line x1="25" y1="45" x2="75" y2="45" class="measuring-line" />
                    <text x="46" y="42" class="line-text">A</text>
                    <line x1="50" y1="24" x2="50" y2="85" class="measuring-line" />
                    <text x="53" y="55" class="line-text">B</text>
                    <line x1="35" y1="15" x2="20" y2="30" class="measuring-line" />
                    <text x="23" y="20" class="line-text">C</text>
                </svg>`
            },
            zipup: {
                headers: ["Chest [A]", "Length [B]", "Sleeve [C]"],
                sizes: [
                    { name: "S", vals: [60, 68, 61] },
                    { name: "M", vals: [63, 70, 62.5] },
                    { name: "L", vals: [66, 72, 64] },
                    { name: "XL", vals: [69, 74, 65.5] }
                ],
                svg: `<svg viewBox="0 0 100 100">
                    <path d="M25 32 L35 15 L65 15 L75 32 L70 85 L30 85 Z M50 15 L50 85 M25 32 L13 65 M75 32 L87 65" />
                    <line x1="28" y1="45" x2="72" y2="45" class="measuring-line" />
                    <text x="46" y="41" class="line-text">A</text>
                    <line x1="50" y1="15" x2="50" y2="85" class="measuring-line" />
                    <text x="54" y="55" class="line-text">B</text>
                    <line x1="25" y1="32" x2="13" y2="65" class="measuring-line" />
                    <text x="13" y="45" class="line-text">C</text>
                </svg>`
            },
            hoodie: {
                headers: ["Chest [A]", "Length [B]", "Sleeve [C]"],
                sizes: [
                    { name: "S", vals: [61, 69, 60] },
                    { name: "M", vals: [64, 71, 61.5] },
                    { name: "L", vals: [67, 73, 63] },
                    { name: "XL", vals: [70, 75, 64.5] }
                ],
                svg: `<svg viewBox="0 0 100 100">
                    <path d="M25 35 L35 15 L65 15 L75 35 L70 85 L30 85 Z M35 62 L65 62 L60 75 L40 75 Z M25 35 L12 68 M75 35 L88 68" />
                    <line x1="28" y1="48" x2="72" y2="48" class="measuring-line" />
                    <text x="46" y="44" class="line-text">A</text>
                    <line x1="50" y1="20" x2="50" y2="85" class="measuring-line" />
                    <text x="54" y="55" class="line-text">B</text>
                    <line x1="25" y1="35" x2="12" y2="68" class="measuring-line" />
                    <text x="13" y="48" class="line-text">C</text>
                </svg>`
            },
            crewneck: {
                headers: ["Chest [A]", "Length [B]", "Sleeve [C]"],
                sizes: [
                    { name: "S", vals: [59, 67, 59] },
                    { name: "M", vals: [62, 69, 60.5] },
                    { name: "L", vals: [65, 71, 62] },
                    { name: "XL", vals: [68, 73, 63.5] }
                ],
                svg: `<svg viewBox="0 0 100 100">
                    <path d="M25 30 L40 18 L60 18 L75 30 L70 85 L30 85 Z M25 30 L12 65 M75 30 L88 65" />
                    <line x1="28" y1="45" x2="72" y2="45" class="measuring-line" />
                    <text x="46" y="41" class="line-text">A</text>
                    <line x1="50" y1="18" x2="50" y2="85" class="measuring-line" />
                    <text x="54" y="55" class="line-text">B</text>
                    <line x1="25" y1="30" x2="12" y2="65" class="measuring-line" />
                    <text x="13" y="45" class="line-text">C</text>
                </svg>`
            },
            tshirt: {
                headers: ["Chest [A]", "Length [B]", "Sleeve [C]"],
                sizes: [
                    { name: "S", vals: [56, 70, 22] },
                    { name: "M", vals: [58, 72, 23] },
                    { name: "L", vals: [60, 74, 24] },
                    { name: "XL", vals: [62, 76, 25] }
                ],
                svg: `<svg viewBox="0 0 100 100">
                    <path d="M20 32 L35 20 L65 20 L80 32 L75 85 L25 85 Z M25 42 L15 40 M75 42 L85 40" />
                    <line x1="24" y1="46" x2="76" y2="46" class="measuring-line" />
                    <text x="46" y="42" class="line-text">A</text>
                    <line x1="50" y1="20" x2="50" y2="85" class="measuring-line" />
                    <text x="54" y="55" class="line-text">B</text>
                    <line x1="65" y1="20" x2="80" y2="32" class="measuring-line" />
                    <text x="73" y="23" class="line-text">C</text>
                </svg>`
            },
            pants: {
                headers: ["Waist [A]", "Length [B]", "Inseam [C]"],
                sizes: [
                    { name: "S", vals: [38, 104, 74] },
                    { name: "M", vals: [40, 106, 75] },
                    { name: "L", vals: [42, 108, 76] },
                    { name: "XL", vals: [44, 110, 77] }
                ],
                svg: `<svg viewBox="0 0 100 100">
                    <path d="M28 15 L72 15 L78 85 L53 85 L50 42 L47 85 L22 85 Z" />
                    <line x1="28" y1="15" x2="72" y2="15" class="measuring-line" />
                    <text x="47" y="11" class="line-text">A</text>
                    <line x1="75" y1="15" x2="78" y2="85" class="measuring-line" />
                    <text x="81" y="50" class="line-text">B</text>
                    <line x1="50" y1="42" x2="48" y2="85" class="measuring-line" />
                    <text x="41" y="65" class="line-text">C</text>
                </svg>`
            }
        };

        let currentProduct = 'jersey';
        let currentUnit = 'metric';

        function renderTable() {
            const prod = sizeData[currentProduct];
            const tbody = document.getElementById('sizeTableBody');
            const blueprintContainer = document.getElementById('blueprintContainer');
            
            blueprintContainer.innerHTML = prod.svg;

            document.getElementById('param1').firstChild.textContent = prod.headers[0] + " ";
            document.getElementById('param2').firstChild.textContent = prod.headers[1] + " ";
            document.getElementById('param3').firstChild.textContent = prod.headers[2] + " ";

            const unitTxt = currentUnit === 'metric' ? '(CM)' : '(IN)';
            document.getElementById('unit1').innerText = unitTxt;
            document.getElementById('unit2').innerText = unitTxt;
            document.getElementById('unit3').innerText = unitTxt;

            tbody.innerHTML = "";
            prod.sizes.forEach(s => {
                let row = `<tr><td class="size-cell">${s.name}</td>`;
                s.vals.forEach(val => {
                    let displayVal = currentUnit === 'metric' ? val : (val / 2.54).toFixed(1);
                    row += `<td>${displayVal}</td>`;
                });
                row += `</tr>`;
                tbody.innerHTML += row;
            });
        }

        function selectProduct(prodKey, element) {
            currentProduct = prodKey;
            document.querySelectorAll('.product-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            renderTable();
        }

        function setUnit(unit) {
            currentUnit = unit;
            const metricBtn = document.getElementById('metricBtn');
            const imperialBtn = document.getElementById('imperialBtn');

            if (unit === 'metric') {
                metricBtn.classList.add('active');
                imperialBtn.classList.remove('active');
            } else {
                imperialBtn.classList.add('active');
                metricBtn.classList.remove('active');
            }
            renderTable();
        }

        renderTable();
    </script>
</body>
</html>
